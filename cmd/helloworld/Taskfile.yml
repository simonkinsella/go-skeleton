# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

tasks:
  default:
    desc: Print a greeting message
    cmds:
      - echo "{{.GREETING}}"
    silent: true

  build:
    desc: Build the executable
    cmds:
      - go build -o helloworld  .

  run:
    desc: Run the code directly with `go run`
    cmds:
      - go run main.go
